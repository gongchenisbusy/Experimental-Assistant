        area_ratio: 0.75
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: W 4f screening example. The vendor reference reports well-separated W 4f spin-orbit components near 2.17 eV; f-level degeneracy supports a 4f5/2-to-4f7/2 area ratio near 3:4.
        applicability_notes:
          - Use only when W 4f7/2 and W 4f5/2 components are reviewed as a doublet and the region is separated from W metal loss or overlapping features.
