      - candidate_id: xps-builtin-c1s-adventitious-cc-binding-energy-candidate
        suggestion_type: binding_energy_candidate
        element: C
        core_level: 1s
        chemical_state_label: Adventitious or hydrocarbon C-C/C-H C 1s candidate
        expected_binding_energy_eV: 284.8
        binding_energy_window_eV:
          - 284.6
          - 285.0
        calibration_reference: User-reviewed C 1s or instrument calibration context required; the Thermo reference notes C-C is often set to 284.8 eV by default but is not always valid.
        charge_reference_assumption: Do not use this candidate to apply charge correction automatically; record the actual project charge-neutralization or BE-referencing procedure before report use.
        parameter_origin: source_suggested
        source_summary: Thermo's carbon XPS reference lists adventitious-carbon C-C near 284.8 eV and explicitly cautions that this default charge reference is not always valid.
        applicability_notes:
          - Use only for spectra where the user confirms adventitious/hydrocarbon carbon is plausible and the C 1s region is reviewed.
          - Treat this as a BE/reference discussion candidate, not as an instruction to shift the spectrum.
        overlap_notes:
          - C 1s may overlap Ru 3d, Sr 3p1/2, or K 2p in some systems.
          - Adventitious carbon chemistry and film thickness can shift apparent C 1s position.
        reference_ids:
          - builtin-xps-thermo-c
          - builtin-xps-charge-reference-guide-2020
        confidence: medium
        caveats:
          - Not a universal charge reference.
          - Does not prove surface contamination source, carbon hybridization, or sample composition.
      - candidate_id: xps-builtin-c1s-c-o-c-binding-energy-candidate
        suggestion_type: binding_energy_candidate
        element: C
        core_level: 1s
        chemical_state_label: C-O-C / C-O C 1s candidate
        expected_binding_energy_eV: 286.0
        binding_energy_window_eV:
          - 285.7
          - 286.4
        calibration_reference: Candidate assumes the C 1s energy scale has already been reviewed, commonly relative to a project-approved C-C/C-H reference near 284.8 eV or another documented calibration.
        charge_reference_assumption: No charge correction is applied by this candidate; insulating or mixed samples require a separately reviewed referencing procedure.
        parameter_origin: source_suggested
        source_summary: Thermo's carbon XPS reference lists C-O-C near 286 eV in adventitious carbon and C-O near 286 eV for polymers.
        applicability_notes:
          - Use only after C 1s baseline/background and possible overlapping components are reviewed.
          - Interpret with O 1s, sample chemistry, and project literature before assigning oxygenated carbon.
        overlap_notes:
          - C-N, C-O, and ether/alcohol-like contributions can appear in similar C 1s ranges.
        reference_ids:
          - builtin-xps-thermo-c
          - builtin-xps-charge-reference-guide-2020
        confidence: low
        caveats:
          - C 1s BE alone cannot distinguish all C-O, C-N, ether, alcohol, or contamination contributions.
          - Not a functional-group or composition proof.
