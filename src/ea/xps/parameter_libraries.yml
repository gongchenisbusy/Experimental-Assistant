    candidates:
      - candidate_id: xps-builtin-fe2p-spin-orbit-metal-screening
        suggestion_type: spin_orbit_constraint
        element: Fe
        core_level: 2p
        constraint_id: xps-spin-fe2p-metal-screening
        center_delta_eV: 13.1
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Fe 2p metal screening example. The vendor reference reports an Fe 2p metal spin-orbit separation near 13.1 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio of about 1:2.
        applicability_notes:
          - Use only when the user confirms Fe 2p anchor/dependent component identities, reviewed bounds, background model, and whether a metal-like reference is appropriate.
          - Treat oxides, hydroxides, multiplet structures, shake-up satellites, and mixed states as separate interpretation problems.
        reference_ids:
          - builtin-xps-thermo-fe
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Screening constraint only; not chemical-state proof.
          - Do not apply to Fe oxides or mixed Fe states without project-specific references and review.
      - candidate_id: xps-builtin-si2p-spin-orbit-elemental-screening
        suggestion_type: spin_orbit_constraint
        element: Si
        core_level: 2p
        constraint_id: xps-spin-si2p-elemental-screening
        center_delta_eV: 0.63
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Si 2p elemental screening example. The vendor reference reports closely spaced Si 2p spin-orbit components near 0.63 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio of about 1:2.
        applicability_notes:
          - Use only when spectral resolution, pass energy, and material context make Si 2p splitting meaningful for the current project.
          - For silicon compounds, broad oxide envelopes may make explicit doublet splitting inappropriate unless a reviewed protocol supports it.
        reference_ids:
          - builtin-xps-thermo-si
          - builtin-xps-handbook-1995
          - builtin-xps-step-guide-2022
        confidence: low
        caveats:
          - Low splitting can be near instrumental resolution.
          - Not a standalone Si chemical-state assignment.
      - candidate_id: xps-builtin-cu2p-spin-orbit-large-splitting-screening
        suggestion_type: spin_orbit_constraint
        element: Cu
        core_level: 2p
        constraint_id: xps-spin-cu2p-large-splitting-screening
        center_delta_eV: 19.8
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Cu 2p large-splitting screening example. The step-by-step XPS guide discusses Cu 2p components separated by about 19.8 eV; general spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio of about 1:2.
        applicability_notes:
          - Use only after the user confirms whether both Cu 2p components should be fit together or whether analysis should focus on the 2p3/2 envelope.
          - Review satellite structure, Auger information, and project-specific Cu references before any oxidation-state interpretation.
        reference_ids:
          - builtin-xps-step-guide-2022
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Cu 2p satellites and Auger parameters often matter for chemical-state interpretation.
          - This is not a Cu(0)/Cu(I)/Cu(II) assignment.
      - candidate_id: xps-builtin-ti2p-oxide-spin-orbit-screening
        suggestion_type: spin_orbit_constraint
        element: Ti
        core_level: 2p
        constraint_id: xps-spin-ti2p-oxide-screening
        center_delta_eV: 5.7
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Ti 2p oxide-family screening example. The vendor reference reports Ti 2p spin-orbit separations that vary with chemical state, including about 5.7 eV for oxide, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only when the user confirms Ti 2p anchor/dependent component identities, reviewed bounds, background model, and whether oxide-like Ti 2p treatment is appropriate.
          - Review Ti metal, nitride, oxide, mixed-valence, satellite, and Coster-Kronig broadening context before using equal-width constraints.
        reference_ids:
          - builtin-xps-thermo-ti
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Ti 2p splitting and widths can vary with chemical state and fitting convention.
          - This is not a Ti oxidation-state assignment.
      - candidate_id: xps-builtin-ni2p-spin-orbit-metal-screening
        suggestion_type: spin_orbit_constraint
        element: Ni
        core_level: 2p
        constraint_id: xps-spin-ni2p-metal-screening
        center_delta_eV: 17.3
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Ni 2p metal screening example. The vendor reference reports a Ni 2p metal spin-orbit separation near 17.3 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only after the user reviews Ni metal/oxide/hydroxide context, satellite structure, multiplet splitting, background, and component bounds.
          - Treat Ni 2p chemical-state interpretation as a separate review problem that often needs satellites and references.
        reference_ids:
          - builtin-xps-thermo-ni
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Ni 2p spectra can have strong satellites and multiplet structure.
          - This is not a Ni(0)/Ni(II)/Ni(III) assignment.
      - candidate_id: xps-builtin-co2p-spin-orbit-metal-screening
        suggestion_type: spin_orbit_constraint
        element: Co
        core_level: 2p
        constraint_id: xps-spin-co2p-metal-screening
        center_delta_eV: 14.99
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Co 2p metal screening example. The vendor reference reports a Co 2p metal spin-orbit separation near 14.99 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only when Co 2p component identities, Auger overlap risk, satellites, multiplet structure, background, and bounds are reviewed.
          - Mixed oxides, hydroxides, and cobaltate systems need project-specific references before interpretation.
        reference_ids:
          - builtin-xps-thermo-co
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Co 2p regions can overlap weaker Co LMM Auger features and satellites.
          - This is not a Co chemical-state assignment.
      - candidate_id: xps-builtin-zn2p-spin-orbit-screening
        suggestion_type: spin_orbit_constraint
        element: Zn
        core_level: 2p
        constraint_id: xps-spin-zn2p-screening
        center_delta_eV: 23.0
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Zn 2p screening example. The vendor reference reports significantly split Zn 2p spin-orbit components around 23 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only when the user confirms Zn 2p anchor/dependent components and whether the wide doublet should be constrained in the current region.
          - Review O 1s, Auger parameters, and project references before any ZnO, hydroxide, carbonate, or vacancy interpretation.
        reference_ids:
          - builtin-xps-thermo-zn
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Zn 2p binding-energy shifts can be small across some Zn chemical states.
          - This is not a Zn chemical-state or oxygen-defect assignment.
      - candidate_id: xps-builtin-mo3d-spin-orbit-screening
        suggestion_type: spin_orbit_constraint
        element: Mo
        core_level: 3d
        constraint_id: xps-spin-mo3d-screening
        center_delta_eV: 3.15
        area_ratio: 0.6667
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Mo 3d screening example. The vendor reference reports well-separated Mo 3d spin-orbit components near 3.15 eV; d-level degeneracy supports a 3d3/2-to-3d5/2 area ratio near 2:3.
        applicability_notes:
          - Use only when Mo 3d5/2 and 3d3/2 components are reviewed as a paired doublet for the current chemical environment.
          - Review metal/oxide/sulfide phase context, asymmetric versus symmetric peak shape, and X-ray or sputter-induced reduction before interpretation.
        reference_ids:
          - builtin-xps-thermo-mo
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Multiple Mo oxides/sulfides and reduced species can coexist and overlap.
          - This is not a Mo oxidation-state assignment.
      - candidate_id: xps-builtin-w4f-spin-orbit-screening
        suggestion_type: spin_orbit_constraint
        element: W
        core_level: 4f
        constraint_id: xps-spin-w4f-screening
        center_delta_eV: 2.17
        area_ratio: 0.75
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: W 4f screening example. The vendor reference reports well-separated W 4f spin-orbit components near 2.17 eV; f-level degeneracy supports a 4f5/2-to-4f7/2 area ratio near 3:4.
        applicability_notes:
          - Use only when W 4f7/2 and W 4f5/2 components are reviewed as a doublet and the region is separated from W metal loss or overlapping features.
          - Review metal/oxide context, asymmetric metal peak shape, and project-specific WOx references before interpretation.
        reference_ids:
          - builtin-xps-thermo-w
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - W metal loss features and W oxide peaks can overlap.
          - This is not a W oxidation-state assignment.
      - candidate_id: xps-builtin-s2p-spin-orbit-generic-screening
        suggestion_type: spin_orbit_constraint
        element: S
        core_level: 2p
        constraint_id: xps-spin-s2p-generic-screening
        center_delta_eV: 1.16
        area_ratio: 0.511
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: S 2p generic screening example. The vendor reference reports closely spaced S 2p spin-orbit components near 1.16 eV with an intensity ratio near 0.511 for 2p1/2 relative to 2p3/2.
        applicability_notes:
          - Use only when spectral resolution, pass energy, and chemical-state complexity make an explicit S 2p doublet constraint useful.
          - Multi-state sulfur materials should be fit as reviewed doublet families, not isolated single peaks.
        reference_ids:
          - builtin-xps-thermo-s
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - S 2p components can be unresolved or appear as asymmetric envelopes depending on sample and instrument.
          - This is not a sulfide/sulfate/elemental sulfur assignment.
      - candidate_id: xps-builtin-p2p-spin-orbit-generic-screening
        suggestion_type: spin_orbit_constraint
        element: P
        core_level: 2p
        constraint_id: xps-spin-p2p-generic-screening
        center_delta_eV: 0.87
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: P 2p generic screening example. The vendor reference reports closely spaced P 2p spin-orbit components near 0.87 eV; general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only when the user reviews whether P 2p splitting is resolvable for the current pass energy, chemistry, and peak width.
          - Review Zn 3s or other overlaps when relevant before assigning phosphorus chemical states.
        reference_ids:
          - builtin-xps-thermo-p
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - P 2p components may not be visibly resolved in some phosphates or broad spectra.
          - This is not a phosphide/phosphate/organophosphorus assignment.
      - candidate_id: xps-builtin-tougaard-u2-typical-background-screening
        suggestion_type: tougaard_parameter
        tougaard_B: 2866.0
        tougaard_C_eV2: 1643.0
        integration_direction: toward_higher_binding_energy
        parameter_origin: source_suggested
        source_summary: Tougaard U2-style background screening example. Background guides discuss typical two-parameter Tougaard values around B = 2866 eV2 and C = 1643 eV2, but background choice and scaling are sample- and protocol-dependent.
        applicability_notes:
          - Use only after the user confirms the core-level region, endpoints/window, intensity column, and whether Tougaard treatment is appropriate for the material and analysis goal.
          - Treat B/C as a reviewed starting point, not as a fitted or universally valid background.
        reference_ids:
          - builtin-xps-background-guide-2021
          - builtin-xps-intro-background-guide-2020
        confidence: low
        caveats:
          - Does not run QUASES or depth-profile modeling.
          - Does not subtract a background until copied into reviewed processing parameters with a confirmed review record.
