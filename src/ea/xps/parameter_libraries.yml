    candidates:
      - candidate_id: xps-builtin-fe2p-spin-orbit-metal-screening
        suggestion_type: spin_orbit_constraint
        element: Fe
        core_level: 2p
        constraint_id: xps-spin-fe2p-metal-screening
        center_delta_eV: 13.1
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Fe 2p metal screening example. The vendor reference reports an Fe 2p metal spin-orbit separation near 13.1 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio of about 1:2.
        applicability_notes:
          - Use only when the user confirms Fe 2p anchor/dependent component identities, reviewed bounds, background model, and whether a metal-like reference is appropriate.
          - Treat oxides, hydroxides, multiplet structures, shake-up satellites, and mixed states as separate interpretation problems.
        reference_ids:
          - builtin-xps-thermo-fe
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Screening constraint only; not chemical-state proof.
          - Do not apply to Fe oxides or mixed Fe states without project-specific references and review.
      - candidate_id: xps-builtin-si2p-spin-orbit-elemental-screening
        suggestion_type: spin_orbit_constraint
        element: Si
        core_level: 2p
        constraint_id: xps-spin-si2p-elemental-screening
        center_delta_eV: 0.63
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Si 2p elemental screening example. The vendor reference reports closely spaced Si 2p spin-orbit components near 0.63 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio of about 1:2.
        applicability_notes:
          - Use only when spectral resolution, pass energy, and material context make Si 2p splitting meaningful for the current project.
          - For silicon compounds, broad oxide envelopes may make explicit doublet splitting inappropriate unless a reviewed protocol supports it.
        reference_ids:
          - builtin-xps-thermo-si
          - builtin-xps-handbook-1995
          - builtin-xps-step-guide-2022
        confidence: low
        caveats:
          - Low splitting can be near instrumental resolution.
          - Not a standalone Si chemical-state assignment.
      - candidate_id: xps-builtin-cu2p-spin-orbit-large-splitting-screening
        suggestion_type: spin_orbit_constraint
        element: Cu
        core_level: 2p
        constraint_id: xps-spin-cu2p-large-splitting-screening
        center_delta_eV: 19.8
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Cu 2p large-splitting screening example. The step-by-step XPS guide discusses Cu 2p components separated by about 19.8 eV; general spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio of about 1:2.
        applicability_notes:
          - Use only after the user confirms whether both Cu 2p components should be fit together or whether analysis should focus on the 2p3/2 envelope.
          - Review satellite structure, Auger information, and project-specific Cu references before any oxidation-state interpretation.
        reference_ids:
          - builtin-xps-step-guide-2022
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Cu 2p satellites and Auger parameters often matter for chemical-state interpretation.
          - This is not a Cu(0)/Cu(I)/Cu(II) assignment.
      - candidate_id: xps-builtin-ti2p-oxide-spin-orbit-screening
        suggestion_type: spin_orbit_constraint
        element: Ti
        core_level: 2p
        constraint_id: xps-spin-ti2p-oxide-screening
        center_delta_eV: 5.7
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Ti 2p oxide-family screening example. The vendor reference reports Ti 2p spin-orbit separations that vary with chemical state, including about 5.7 eV for oxide, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only when the user confirms Ti 2p anchor/dependent component identities, reviewed bounds, background model, and whether oxide-like Ti 2p treatment is appropriate.
          - Review Ti metal, nitride, oxide, mixed-valence, satellite, and Coster-Kronig broadening context before using equal-width constraints.
        reference_ids:
          - builtin-xps-thermo-ti
          - builtin-xps-handbook-1995
          - builtin-xps-nist-srd20
        confidence: low
        caveats:
          - Ti 2p splitting and widths can vary with chemical state and fitting convention.
          - This is not a Ti oxidation-state assignment.
      - candidate_id: xps-builtin-ni2p-spin-orbit-metal-screening
        suggestion_type: spin_orbit_constraint
        element: Ni
        core_level: 2p
        constraint_id: xps-spin-ni2p-metal-screening
        center_delta_eV: 17.3
        area_ratio: 0.5
        fwhm_ratio: 1.0
        parameter_origin: source_suggested
        source_summary: Ni 2p metal screening example. The vendor reference reports a Ni 2p metal spin-orbit separation near 17.3 eV, while general XPS spin-orbit conventions support a 2p1/2-to-2p3/2 area ratio near 1:2.
        applicability_notes:
          - Use only after the user reviews Ni metal/oxide/hydroxide context, satellite structure, multiplet splitting, background, and component bounds.
          - Treat Ni 2p chemical-state interpretation as a separate review problem that often needs satellites and references.
        reference_ids:
