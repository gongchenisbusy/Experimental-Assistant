        suggestion_type: binding_energy_candidate
        element: C
        core_level: 1s
        chemical_state_label: O-C=O / carboxylate-like C 1s candidate
        expected_binding_energy_eV: 288.5
        binding_energy_window_eV:
          - 288.0
          - 289.2
        calibration_reference: Candidate assumes the C 1s energy scale has already been reviewed, commonly relative to a project-approved C-C/C-H reference near 284.8 eV or another documented calibration.
        charge_reference_assumption: No charge correction is applied by this candidate; document charge neutralization and BE referencing before using it as report evidence.
        parameter_origin: source_suggested
        source_summary: Thermo's carbon XPS reference lists O-C=O near 288.5 eV for adventitious carbon and C=O-style polymer contributions around 288-290 eV.
        applicability_notes:
          - Use only when sample chemistry, O 1s data, and reviewed C 1s fitting context make a carboxylate/ester/carbonyl discussion plausible.
