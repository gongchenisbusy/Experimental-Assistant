name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }} / Python ${{ matrix.python }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python }}"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Validate identities and skills
        run: |
          python scripts/check_version_identity.py
          python scripts/check_downloaded_skill_instructions.py
          python scripts/validate_skill_packages.py
      - name: Native Windows long-path and GBK regressions
        if: runner.os == 'Windows'
        run: python -m pytest -q tests/test_windows_release_regressions.py tests/test_install_experience.py::test_windows_gbk_validator_output_decodes_without_mojibake
      - name: Test
        run: python -m pytest -q

  minimum-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements/minimum.txt
      - run: python -m pip install --no-deps -e .
      - run: python -m pytest -q

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Lint for syntax and undefined names
        run: ruff check src tests scripts --select E9,F63,F7,F82
      - name: Check formatting of v0.9.9 release surfaces
        run: >-
          ruff format --check
          src/ea/identity.py src/ea/errors.py src/ea/diagnostics.py src/ea/drafts.py
          src/ea/release_*.py tests/test_release_*.py
          scripts/check_docs_links.py scripts/check_version_identity.py scripts/check_downloaded_skill_instructions.py
      - run: python scripts/check_docs_links.py
      - name: Run portability and sensitive-value scans
        run: >-
          python scripts/public_release_smoke.py
          --skip-tests --skip-skill-validation --skip-cli-sanity --skip-public-examples

  package:
    name: "Package / ${{ matrix.os }} / Python 3.12"
    runs-on: "${{ matrix.os }}"
    env:
      PIP_CONSTRAINT: requirements/release.txt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[release]" -c requirements/release.txt
      - run: python -m build
      - name: Install wheel and sdist in clean environments
        run: python -m ea.release_artifacts

  release-engineering:
    runs-on: ubuntu-latest
    env:
      PIP_CONSTRAINT: requirements/release.txt
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[release]" -c requirements/release.txt
      - run: python -m build
      - run: python -m ea.release_reproducibility
      - run: python -m ea.release_artifacts
      - run: python -m ea.release_supply_chain
      - run: python -m ea.release_skill_bundle
      - uses: actions/upload-artifact@v6
        with:
          name: release-engineering-evidence
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-install-smoke.json
            dist/*-reproducibility.json
            dist/*-sbom.json
            dist/*-vulnerability-report.json
            dist/*-skills.zip
            dist/*-skills.zip.sha256

  python-314-observation:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
