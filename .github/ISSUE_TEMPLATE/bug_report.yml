name: Bug report
description: Report a reproducible EA behavior problem without private research data.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, cookies, browser profiles, institution sessions, private PDFs, or raw research data. Report security issues through SECURITY.md."
  - type: input
    id: version
    attributes:
      label: EA version
      placeholder: "ea version --json"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, Ubuntu/Linux, macOS, Other]
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow and expected behavior
      description: Describe the user goal and what should have happened.
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior and minimal reproduction
      description: Use public-safe synthetic data or redacted paths.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private research data, browser state, and restricted full text.
          required: true
