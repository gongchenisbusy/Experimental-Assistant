candidates:
- candidate_id: ftir-builtin-oh-nh-stretching-generic
  assignment_type: functional_group
  assignment_label: broad O-H or N-H stretching candidate
  band_label: broad high-wavenumber stretching band
  material_scope: generic materials; polymers; oxides; hydroxylated surfaces; adsorbed
    water; amines; amides
  sample_scope: samples where hydroxyl, amine, amide, moisture, or surface adsorbate
    context is plausible
  wavenumber_window_cm1:
  - 3200
  - 3600
  expected_feature: absorbance_maximum
  source_summary: Standard group-frequency references list broad O-H and N-H stretching
    absorptions in this high-wavenumber region, with strong overlap from water and
    hydrogen bonding.
  applicability_notes:
  - Use only as a broad screening candidate until atmosphere, drying, sample preparation,
    and chemistry are reviewed.
  - Broadness and band shape matter; a single maximum is weaker evidence than a reviewed
    broad envelope.
  reference_ids:
  - builtin-ftir-socrates-2001
  - builtin-ftir-colthup-1990
  confidence: low
  caveats:
  - Moisture, hydrogen bonding, and sample-preparation artifacts commonly affect this
    region.
  - This window does not distinguish O-H from N-H without project context and additional
    evidence.
- candidate_id: ftir-builtin-aliphatic-ch-stretching-generic
  assignment_type: functional_group
  assignment_label: aliphatic C-H stretching candidate
  band_label: aliphatic C-H stretching band
  material_scope: generic materials; polymers; organic ligands; binders; surfactants;
    carbonaceous residues
  sample_scope: samples where organic chains, binders, surfactants, ligands, or contamination
    are plausible
  wavenumber_window_cm1:
  - 2850
  - 2970
  expected_feature: absorbance_maximum
  source_summary: Standard group-frequency references place aliphatic C-H stretching
    bands in the 2850-2970 cm^-1 region for many organic materials.
  applicability_notes:
  - Compare with project chemistry and sample history before interpreting as a real
    material component.
  - Check whether binders, solvents, ligands, or handling residues could explain the
    feature.
  reference_ids:
  - builtin-ftir-socrates-2001
  - builtin-ftir-colthup-1990
  confidence: low
  caveats:
  - Organic contamination and processing residues can produce similar bands.
  - Band-window match alone is not proof of alkyl groups in the target material.
- candidate_id: ftir-builtin-carbonyl-co-stretching-generic
  assignment_type: functional_group
  assignment_label: carbonyl C=O stretching candidate
  band_label: carbonyl stretching band
  material_scope: generic materials; polymers; esters; carboxylates; amides; carbonates;
    oxidized surfaces
  sample_scope: samples where oxygen-containing organic groups, oxidized ligands,
    polymers, esters, acids, amides, or carbonates are plausible
  wavenumber_window_cm1:
  - 1650
  - 1800
  expected_feature: absorbance_maximum
  source_summary: Standard group-frequency references place many C=O stretching absorptions
    in the 1650-1800 cm^-1 region, with position depending strongly on conjugation,
    hydrogen bonding, and functional group class.
  applicability_notes:
  - Treat this as a candidate family, not a specific carbonyl environment.
  - Use project chemistry, neighboring bands, and references to distinguish ester,
    acid, amide, carbonate, or other carbonyl-like sources.
  reference_ids:
  - builtin-ftir-socrates-2001
  - builtin-ftir-colthup-1990
  confidence: low
  caveats:
  - Water bending, amide bands, C=C modes, and other overlapping bands can affect
    this region.
  - The candidate does not identify a specific compound or carbonyl environment by
    itself.
- candidate_id: ftir-builtin-sio-stretching-generic
  assignment_type: functional_group
  assignment_label: Si-O or inorganic oxide stretching candidate
  band_label: Si-O/oxide stretching band
  material_scope: generic materials; silica; silicates; glass; oxide surfaces; hybrid
    organic-inorganic materials
  sample_scope: samples where silica, silicate, glass, oxide, or surface oxygen networks
    are plausible
  wavenumber_window_cm1:
  - 900
  - 1150
  expected_feature: absorbance_maximum
  source_summary: Standard group-frequency references and common FTIR practice associate
    strong Si-O or related oxide network stretching bands with the 900-1150 cm^-1
    region, but exact positions are system-dependent.
  applicability_notes:
  - Use project material identity and reference spectra to distinguish Si-O from organic
    fingerprint bands.
  - Check whether the sample, substrate, filler, or support contains silica or other
    oxides.
  reference_ids:
  - builtin-ftir-socrates-2001
  - builtin-ftir-colthup-1990
  confidence: low
  caveats:
  - Organic C-O/C-N fingerprint bands can overlap this region.
  - This candidate is not a definitive oxide-network assignment.
