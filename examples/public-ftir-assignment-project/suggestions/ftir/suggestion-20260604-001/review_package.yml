  source_summary: Standard group-frequency references list broad O-H and N-H stretching
    absorptions in this high-wavenumber region, with strong overlap from water and
    hydrogen bonding.
  applicability_notes:
  - Use only as a broad screening candidate until atmosphere, drying, sample preparation,
    and chemistry are reviewed.
  - Broadness and band shape matter; a single maximum is weaker evidence than a reviewed
    broad envelope.
  caveats:
  - Moisture, hydrogen bonding, and sample-preparation artifacts commonly affect this
    region.
  - This window does not distinguish O-H from N-H without project context and additional
    evidence.
