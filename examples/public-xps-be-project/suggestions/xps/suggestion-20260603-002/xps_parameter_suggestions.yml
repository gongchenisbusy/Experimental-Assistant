- candidate_id: xps-builtin-o1s-lattice-oxide-binding-energy-candidate
  suggestion_type: binding_energy_candidate
  requires_user_review: true
  auto_applied: false
  parameter_origin: source_suggested
  source_summary: Thermo and Cardiff public O 1s references list metal oxide / M-O
    O 1s around 529-530 eV, while recent O 1s guidance describes lattice oxygen in
    transition-metal oxides around 529.5-531 eV and stresses calibration and corroborating
    evidence.
  reference_ids:
  - builtin-xps-thermo-o
  - builtin-xps-cardiff-o1s-reference
  - builtin-xps-o1s-metal-oxide-insight-2025
  - builtin-xps-charge-reference-guide-2020
  unresolved_reference_ids: []
  applicability_notes:
  - Use only when a metal oxide or oxide-surface context is plausible and the user
    has reviewed sample handling, calibration, background, and metal core-level context.
  - Treat a lattice-oxide candidate as an interpretation hypothesis for report discussion,
    not as an automatic oxide stoichiometry or phase assignment.
  confidence: medium
  element: O
  core_level: 1s
  caveats:
  - Not a standalone proof of oxide phase, oxide stoichiometry, oxide thickness, oxygen
    deficiency, or catalytic activity.
  - Requires project-specific metal core-level, C 1s, calibration, and sample-history
    evidence before final assignment.
  target_parameter_path: interpretation.binding_energy_candidates
  chemical_state_label: Lattice oxygen / metal oxide O 1s candidate
  expected_binding_energy_eV: 529.8
  binding_energy_window_eV:
  - 529.0
  - 531.0
  binding_energy_min_eV: 529.0
  binding_energy_max_eV: 531.0
  calibration_reference: Candidate assumes reviewed O 1s energy calibration; source
    examples commonly reference C 1s at 284.8 eV, but the project must document its
    actual charge-neutralization and BE-referencing procedure and should cross-check
    a relevant metal core level when possible.
  charge_reference_assumption: No charge correction is applied by this candidate;
    differential charging and incorrect BE correction can move O 1s intensity between
    candidate regions.
  calibration_group_id: null
  overlap_notes:
  - O 1s may overlap Na KLL, Sb 3d, Pd 3p, or V 2p regions depending on the sample.
  - The high-binding-energy side of oxide O 1s can overlap hydroxyl, carbonate, adsorbed
    water, organic oxygen, loss features, or asymmetric conducting-oxide line shapes.
  status: ready_for_user_review
  missing_fields: []
