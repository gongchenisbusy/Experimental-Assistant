guidance_notes:
- Built-in XPS candidates are screening starting points. Register or replace their
  reference_seeds before treating suggestions as report evidence.
- Charge neutralization and binding-energy referencing should be documented as reviewed
  calibration metadata; do not silently apply adventitious-carbon or shared charge
  corrections from this library.
- Prefer project-specific reference spectra, instrument guidance, and reviewed fitting
  protocols when they are available.
