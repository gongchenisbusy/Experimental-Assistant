boundaries:
- Source packets are staging artifacts and do not apply values to XPS processing parameters.
- reference_seeds are registration hints only; they do not inject report citations,
  download PDFs, apply XPS parameters, prove chemical states, or calculate composition.
- This source-packet builder is a deterministic staging step and does not perform
  unconfirmed live network lookup or parse full text during the command. Values may
  originate from user-provided data, local libraries, project literature records,
  or separately confirmed literature/search connectors, and EA may use those sources
  to prepare candidates. The packet still does not auto-choose or apply components/backgrounds/bounds/peak
  shapes, apply fitting, prove chemical states, or calculate composition.
- Confirmed-literature manifests are source-candidate manifests only; they do not
  register references, inject report citations, apply XPS parameters, fit backgrounds/components,
  prove chemical states, or calculate composition.
