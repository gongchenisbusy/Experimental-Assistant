guidance_notes:
- O 1s oxide-surface candidates are interpretation starters for reviewed source packets,
  not automatic chemical-state assignments.
- Use sample history, C 1s, relevant metal core levels, calibration metadata, background
  choice, peak width, and project references before treating any O 1s component as
  report evidence.
- The 531-532 eV O 1s region is especially overlap-prone; do not label it as oxygen
  vacancies without independent, project-specific evidence and review.
