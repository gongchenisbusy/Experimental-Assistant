    status: builtin_v0_2_reference
    category: characterization.image
    method: image
    notes: Generic SEM, TEM, AFM-image, and optical microscopy report workflow with explicit user-description gates.
  - id: ea.local-literature-library
    manifest: skill-registry/builtins/local-literature-library.yml
    status: builtin_v0_2_reference
    category: literature.library
    method: local_literature_library
    notes: Literature initialization decision, planning, confirmation, explicit public metadata search, supplied-candidate ranking, handoff/request generation, acquisition-manifest import, reference registration, and status-sync workflow implemented; Zotero, browser, institution login, and PDF acquisition remain user-confirmed external/dedicated workflow steps.
  - id: ea.pl-analysis
