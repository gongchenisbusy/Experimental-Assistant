skills:
  - id: ea.electrochemistry-analysis
    manifest: skill-registry/builtins/electrochemistry-analysis.yml
    status: builtin_v0_2_reference
    category: characterization.electrochemistry
    method: electrochemistry
    notes: Minimal electrochemistry workflow implemented for review-gated CV/LSV/chrono/GCD/EIS-style tabular data, current conversion, optional current-density normalization, reviewed potential_conversion offset transforms, reviewed ir_drop_correction coordinate corrections, reviewed eis_circuit_fit series-R-RC screening fits, reviewed tafel_analysis kinetic-window screening fits, reviewed gcd_analysis discharge-window capacity/capacitance screening metrics, eis_nyquist_screening, correction_records for reviewed reference/iR metadata, traceable figures, and confidence-labeled reports; automatic circuit/model selection, automatic kinetic/discharge-window selection, rate/stability assessment, formal overpotential proof, and formal performance metrics remain future work.
  - id: ea.ftir-analysis
    manifest: skill-registry/builtins/ftir-analysis.yml
    status: builtin_v0_2_reference
    category: characterization.spectrum
    method: ftir
    notes: Minimal FTIR workflow implemented for review-gated band detection, broad band-family screening hints, context_records for reviewed instrument/background/reference metadata, source-backed assignment_source_packets from a built_in_assignment_library, local libraries, or templates, advisory assignment_suggestions under suggestions/ftir that match candidate windows to detected bands, optional report integration for assignment suggestions with registered references, traceable figures, and confidence-labeled reports; built-in packets include reference_seeds and formal functional-group or composition conclusions still require registered/reviewed reference spectra or literature and user review.
  - id: ea.image-analysis
