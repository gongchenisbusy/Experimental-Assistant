    method: thermal_analysis
    notes: Minimal thermal analysis workflow implemented for review-gated TGA/DSC/DTG-style tabular data, temperature conversion, mass/heat-flow event summaries, baseline_corrections for reviewed DSC/DTG linear baseline processing, transition_screening for reviewed DSC Tg/Tm/Tc-style candidate windows, transition_assignments for user-confirmed interpretation records, context_records for reviewed DSC sign/baseline/reference/sample/atmosphere metadata, traceable figures, and confidence-labeled reports; kinetic models, non-linear/reference correction, and automatic formal transition assignment models remain future work.
  - id: ea.uv-vis-analysis
