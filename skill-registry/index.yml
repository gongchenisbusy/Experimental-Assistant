schema_version: "0.2"
registry_type: ea_builtin_skill_registry
skills:
  - id: ea.electrochemistry-analysis
    manifest: skill-registry/builtins/electrochemistry-analysis.yml
    status: builtin_v0_2_reference
    category: characterization.electrochemistry
    method: electrochemistry
    notes: Minimal electrochemistry workflow implemented for review-gated CV/LSV/chrono/GCD/EIS-style tabular data, current conversion, optional current-density normalization, eis_nyquist_screening, traceable figures, and confidence-labeled reports; equivalent-circuit fitting and formal performance metrics remain future work.
  - id: ea.ftir-analysis
