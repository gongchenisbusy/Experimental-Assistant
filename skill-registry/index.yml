  - id: ea.xps-analysis
    manifest: skill-registry/builtins/xps-analysis.yml
    status: builtin_v0_2_reference
    category: characterization.surface_spectroscopy
    method: xps
    notes: Minimal XPS workflow implemented for review-gated binding-energy calibration metadata, screening peak detection, source-backed parameter_source_packets from local candidate libraries/templates or separately confirmed literature/search connectors, source-backed parameter_suggestions under suggestions/xps, component_quantification_screening from reviewed windows/RSF values, background_model_records for reviewed Shirley/Tougaard/linear/local-minimum choices, reviewed linear, reviewed_shirley_background_subtraction, reviewed_tougaard_u2_background_subtraction preprocessing columns, reviewed_component_fit_screening from explicit reviewed components/bounds/peak shapes/input columns, reviewed spin_orbit_constraints from signed deltas/area ratios/FWHM ratios with parameter_origin/source metadata when values are source-backed, reviewed region_records for survey/core-level/project-region organization and provenance, traceable figures, and confidence-labeled reports; formal chemical-state assignment, automatic background/component/bounds/peak-shape selection, automatic survey-core-level alignment, silent charge-correction sharing, automatic Tougaard parameter fitting, QUASES/depth-profile modeling, unsourced constants, unreviewed constrained fitting, and definitive composition remain out of scope.
  - id: ea.xrd-analysis
