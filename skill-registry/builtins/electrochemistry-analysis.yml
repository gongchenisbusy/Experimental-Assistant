ea_skill:
  id: ea.electrochemistry-analysis
  version: 0.2.0
  category: characterization.electrochemistry
  method: electrochemistry
  input_artifacts:
    - raw_electrochemical_data
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - eis_screening_summary
    - correction_record
    - potential_conversion_record
    - ir_drop_correction_record
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_electrode_and_electrolyte_context
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
  report_requirements:
    inline_numeric_citations: true
    measurement_context_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
  provenance_requirements:
    raw_is_readonly: true
    processing_parameters_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    commands:
      - ea electrochemistry inspect
      - ea electrochemistry process
      - ea electrochemistry report
      - ea templates parameters electrochemistry
      - ea batch validate/run with method: electrochemistry
    supported_modes:
      - cv
      - lsv
      - chrono
      - gcd
      - eis
      - unknown
    supported_units:
      x_unit:
        - V
        - mV
        - s
        - ohm
        - unknown
      current_unit:
        - A
        - mA
        - uA
        - µA
        - unknown
    limitations:
      - eis_nyquist_screening_only_no_equivalent_circuit_fitting
      - correction_records_preserve_reference_and_ir_metadata_without_numeric_correction
      - potential_conversion_is_reviewed_coordinate_transform_only
      - ir_drop_correction_is_reviewed_coordinate_correction_only
      - no_tafel_or_overpotential_extraction
      - no_capacitance_capacity_or_device_performance_claims_without_future_protocol_model
      - no_memory_write_without_user_confirmation
    correction_records:
      implemented: true
      record_format: yaml
      fields:
        - reference_electrode
        - converted_potential_scale
        - uncompensated_resistance
        - ir_compensation
        - correction_notes
      confidence_boundary: metadata_record_only
    potential_conversion:
      implemented: true
      record_format: yaml
      method: reviewed_offset_conversion
      fields:
        - input_scale
        - target_scale
        - offset_V
        - equation
        - output_column
        - reference_electrode
        - reference_ids
        - reviewer_notes
        - caveats
      confidence_boundary: reviewed_coordinate_transform_only_no_ir_tafel_eis_or_performance_claim
    ir_drop_correction:
      implemented: true
      record_format: yaml
      method: reviewed_ir_drop_correction
      fields:
        - ru_ohm
        - compensation_fraction
        - sign_convention
        - formula
        - potential_input_column
        - current_input_column
        - current_unit
        - drop_column
        - output_column
        - reference_ids
        - reviewer_notes
        - caveats
      confidence_boundary: reviewed_coordinate_correction_only_no_tafel_overpotential_eis_gcd_or_performance_claim
