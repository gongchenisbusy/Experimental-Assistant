ea_skill:
  id: ea.electrochemistry-analysis
  version: 0.2.0
  category: characterization.electrochemistry
  method: electrochemistry
  input_artifacts:
    - raw_electrochemical_data
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - eis_screening_summary
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_electrode_and_electrolyte_context
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
  report_requirements:
    inline_numeric_citations: true
    measurement_context_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
  provenance_requirements:
    raw_is_readonly: true
    processing_parameters_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    commands:
      - ea electrochemistry inspect
      - ea electrochemistry process
      - ea electrochemistry report
      - ea templates parameters electrochemistry
      - ea batch validate/run with method: electrochemistry
    supported_modes:
      - cv
      - lsv
      - chrono
      - gcd
      - eis
      - unknown
    supported_units:
      x_unit:
        - V
        - mV
        - s
        - ohm
        - unknown
      current_unit:
        - A
        - mA
        - uA
        - µA
        - unknown
    limitations:
      - eis_nyquist_screening_only_no_equivalent_circuit_fitting
      - no_tafel_or_overpotential_extraction
      - no_capacitance_capacity_or_device_performance_claims_without_future_protocol_model
      - no_memory_write_without_user_confirmation
