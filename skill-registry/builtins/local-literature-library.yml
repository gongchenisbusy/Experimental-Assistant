ea_skill:
  id: ea.local-literature-library
  version: 0.2.0
  category: literature.library
  method: local_literature_library
  input_artifacts:
    - project_context
    - search_scope
    - public_metadata_search_request
    - supplied_candidate_metadata
    - user_confirmation
    - access_settings
    - optional_bibtex_export
  output_artifacts:
    - open_item
    - literature_status
    - public_search_candidate_manifest
    - search_coverage_record
    - public_search_state_record
    - ranked_candidate_table
    - selected_literature_items
    - zotero_codex_bridge_runbook
    - zotero_codex_settings_request
    - reference_record
    - report_section
    - provenance_record
  review_gates:
    - confirm_literature_library_decision
    - confirm_search_scope
    - confirm_bulk_download_scope
    - confirm_reference_import
    - confirm_interpretation_before_memory_write
  required_indices:
    - literature/deployment_status.yml
    - literature/references/index.yml
    - reports/index.yml
    - provenance/index.yml
  requires_network: true
  requires_credentials: true
  user_confirmation_required: true
  user_setup_required: true
  report_requirements:
    inline_numeric_citations: true
    search_log_required: true
    reference_links_required: true
  provenance_requirements:
    search_queries_logged: true
    access_mode_logged: true
    generated_outputs_outside_raw: true
    no_private_account_defaults: true
  current_v0_2_support:
    implemented:
      - initialization_open_item_when_literature_not_enabled
      - deployment_status_when_literature_enabled
      - search_query_and_confirmation_package_generation
      - top_n_confirmation_record
      - explicit_public_metadata_search_connectors
      - public_metadata_search_resume_state
      - supplied_candidate_ranking_and_selection_export
      - dedicated_workflow_handoff_packet
      - zotero_codex_query_and_target_manifest_generation
      - zotero_codex_acquisition_bridge_runbook
      - acquisition_manifest_import_and_reference_registration
      - origin_thread_status_sync
    external_or_user_confirmed:
      - zotero_or_browser_acquisition
      - institution_login
      - pdf_download_and_fulltext_cache_creation
