ea_skill:
  id: ea.ftir-analysis
  version: 0.2.0
  category: characterization.spectrum
  method: ftir
  input_artifacts:
    - raw_spectrum
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - context_record
    - assignment_source_packet
    - assignment_suggestion_record
    - assignment_review_package
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_wavenumber_units
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
    - literature/references/index.yml
  report_requirements:
    inline_numeric_citations: true
    band_assignment_confidence_required: true
    assignment_suggestion_section_advisory: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
    peak_labels_required: true
  provenance_requirements:
    raw_is_readonly: true
    processing_parameters_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    cli:
      - ea ftir inspect
      - ea ftir process
      - ea ftir report
      - ea ftir build-assignment-packet
      - ea ftir suggest-assignments
      - ea ftir prepare-review
      - ea ftir propose-memory
    processing:
      - optional rolling-quantile baseline correction
      - optional Savitzky-Golay smoothing
      - max-absolute normalization
      - absorbance maxima or transmittance minima detection
      - broad band-family screening hints with low or insufficient confidence
    context_records:
      implemented: true
      record_format: yaml
      fields:
        - instrument_accessory
        - atmosphere
        - sample_preparation
        - background
        - reference
        - correction_notes
      confidence_boundary: metadata_record_only
    assignment_suggestions:
      implemented: true
      built_in_assignment_library: generic_materials
      built_in_candidate_scope:
        - broad organic group-frequency starters
        - adsorbed water and surface hydroxyl checks
        - Si-O/silanol and low-wavenumber metal-oxygen regions
        - carbonate/phosphate/sulfate/nitrate inorganic-ion starters
        - carboxylate and amide family candidates
      source_packet_format: yaml
      confirmed_literature_manifest_input: true
      record_format: yaml_and_csv
      review_package_helper: ea ftir prepare-review
      review_package_format: yaml_and_markdown
      reference_seed_registration_helper: ea references register-seeds
      report_integration: optional_via_assignment_suggestion_argument
      memory_candidate_bridge: ea ftir propose-memory
      reference_seeds_required_for_builtin_sources: true
      required_candidate_fields:
        - assignment_label
        - wavenumber_window_cm1
        - source_summary
        - applicability_notes
        - reference_ids
        - confidence
        - caveats
      boundary: source_backed_advisory_only_no_auto_apply_no_composition_or_functional_group_proof
    limitations:
      - broad band-family windows are screening hints, not definitive chemical assignments
      - confirmed literature/source-candidate manifests can populate source packets only when explicit confirmation metadata is present; the packet builder does not run live search, download or parse articles, register references, inject citations, apply assignments, or prove composition/functional groups
      - source-backed assignment suggestions match reviewed candidate windows to detected bands and can be shown in reports, but remain advisory until user review
      - prepare-review writes grouped review packages only and does not create ReviewRecords or confirmed interpretations
      - propose-memory writes draft memory candidates only and does not commit confirmed memory
      - context records preserve reviewed method metadata but do not apply automatic background/reference correction
      - formal functional-group or composition conclusions require project chemistry, reference spectra or literature, and user review
