ea_skill:
  id: ea.xrd-analysis
  version: 0.2.0
  category: characterization.diffraction
  method: xrd
  input_artifacts:
    - raw_diffraction_pattern
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - assignment_library_discovery_summary
    - assignment_source_packet
    - assignment_suggestions
    - assignment_review_package
    - processed_result
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  commands:
    - ea xrd inspect
    - ea xrd list-assignment-libraries
    - ea xrd build-assignment-packet
    - ea xrd suggest-assignments
    - ea xrd prepare-review
    - ea xrd process
    - ea xrd report
  review_gates:
    - confirm_method
    - confirm_two_theta_units
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  optional_review_gates:
    - confirm_assignment_source_packet_candidates
    - confirm_assignment_suggestions_before_report_or_memory
    - confirm_phase_reference_database_for_phase_assignment
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
    - literature/references/index.yml
  report_requirements:
    inline_numeric_citations: true
    phase_assignment_confidence_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
    peak_labels_required: true
  provenance_requirements:
    raw_is_readonly: true
    phase_database_refs_required_for_phase_assignment: true
    generated_outputs_outside_raw: true
