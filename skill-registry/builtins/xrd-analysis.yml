ea_skill:
  id: ea.xrd-analysis
  version: 0.2.0
  category: characterization.diffraction
  method: xrd
  input_artifacts:
    - raw_diffraction_pattern
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_two_theta_units
    - confirm_processing_parameters
    - confirm_phase_reference_database
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
    - literature/references/index.yml
  report_requirements:
    inline_numeric_citations: true
    phase_assignment_confidence_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
    peak_labels_required: true
  provenance_requirements:
    raw_is_readonly: true
    phase_database_refs_required: true
    generated_outputs_outside_raw: true
