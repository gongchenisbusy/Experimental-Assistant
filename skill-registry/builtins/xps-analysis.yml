ea_skill:
  id: ea.xps-analysis
  version: 0.2.0
  category: characterization.surface_spectroscopy
  method: xps
  input_artifacts:
    - raw_spectrum
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - background_model_record
    - background_subtraction_record
    - parameter_source_packet
    - parameter_suggestion_record
    - parameter_suggestion_table
    - parameter_review_package
    - component_fit_record
    - component_fit_table
    - region_records_record
    - region_records_table
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
    - component_quantification_table
  review_gates:
    - confirm_method
    - confirm_binding_energy_calibration
    - confirm_processing_parameters
    - confirm_peak_model
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
    - literature/references/index.yml
  report_requirements:
    inline_numeric_citations: true
    fitted_component_table_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
    component_labels_required: true
  provenance_requirements:
    raw_is_readonly: true
    calibration_reference_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    implemented: true
    commands:
      - ea xps inspect
      - ea xps build-source-packet
      - ea xps suggest-parameters
      - ea xps prepare-review
      - ea xps propose-memory
      - ea xps process
      - ea xps report
    supported_x_units:
      - eV
      - unknown
    implemented_outputs:
      - processed_csv
      - peak_table
      - background_model_record
      - component_table
      - figure_record
      - markdown_report
      - provenance_record
      - component_quantification_screening
      - background_model_records
      - background_subtraction_linear_preprocessing
      - background_subtraction_shirley_preprocessing
      - background_subtraction_tougaard_u2_preprocessing
      - source_backed_parameter_source_packets
      - source_backed_parameter_suggestions
      - xps_parameter_review_packages
      - xps_parameter_memory_candidate_proposals
      - reviewed_component_fit_screening
      - reviewed_region_records
    parameter_suggestions:
      source: ea.xps.parameter_suggestions:v0.2
      default_enabled: false
      built_in_parameter_libraries:
        - generic_xps_parameters
        - oxide_o1s_binding_energy
      input_artifacts:
        - built_in_generic_xps_parameters_seed_library
        - built_in_oxide_o1s_binding_energy_seed_library
        - project_local_parameter_candidate_library
        - editable_parameter_source_packet_template
        - confirmed_literature_source_candidate_manifest
        - user_or_project_supplied_source_packet
        - guidance_reference_ids_when_available
        - registered_reference_ids_when_available
      supported_suggestion_types:
        - spin_orbit_constraint
        - tougaard_parameter
        - binding_energy_candidate
      built_in_candidate_scope:
        - Fe 2p, Si 2p, Cu 2p starter spin-orbit constraints
        - Ti 2p, Ni 2p, Co 2p, Zn 2p transition-metal starter spin-orbit constraints
        - Mo 3d and W 4f chalcogenide/oxide-relevant starter spin-orbit constraints
        - S 2p and P 2p non-metal starter spin-orbit constraints
        - C 1s C-C/C-H, C-O-C, and O-C=O binding-energy starter candidates
        - Si 2p elemental Si and SiO2 binding-energy starter candidates
        - Optional O 1s lattice oxide, hydroxyl/adsorbed oxygen, carbonate/carbonyl, and silica/organic C-O binding-energy starter candidates
        - Tougaard U2-style background starting point
        - Project-local or confirmed-literature binding-energy/chemical-state candidates with BE center/window and calibration assumptions
      output_artifacts:
        - suggestions/xps/source-packets/<source_packet_id>.yml
        - templates/xps_parameter_source_packet.yml
        - suggestions/xps/<suggestion_id>/xps_parameter_suggestions.yml
        - suggestions/xps/<suggestion_id>/xps_parameter_suggestions.csv
        - suggestions/xps/<suggestion_id>/review_package.yml
        - suggestions/xps/<suggestion_id>/review_package.md
        - memory/candidates/<memory_candidate_id>.md
      review_package_helper: ea xps prepare-review
      review_package_format: yaml_and_markdown
      memory_candidate_bridge: ea xps propose-memory
      boundary: advisory_only_no_network_lookup_no_auto_application_no_component_background_selection_no_chemical_state_or_composition_proof
    background_model_records:
      source: ea.xps.background_model:v0.2
      default_enabled: false
      supported_background_types:
        - shirley
        - tougaard
        - linear
        - local_minimum
        - rolling_quantile
        - instrument_applied
        - other
      output_artifacts:
        - xps_background.yml
      boundary: reviewed_model_provenance_only_no_automatic_shirley_tougaard_subtraction_spin_orbit_fitting_composition_or_chemical_state_proof
    background_subtraction:
      source: ea.xps.background_subtraction:v0.2
      default_enabled: false
      supported_methods:
        - reviewed_linear_background_subtraction
        - reviewed_shirley_background_subtraction
        - reviewed_tougaard_u2_background_subtraction
      output_artifacts:
        - xps_background_subtraction.yml
        - xps_linear_background_column
        - xps_shirley_background_column
        - xps_tougaard_u2_background_column
        - xps_background_subtracted_intensity_column
        - xps_shirley_subtracted_intensity_column
        - xps_tougaard_u2_subtracted_intensity_column
      boundary: reviewed_numeric_preprocessing_only_no_endpoint_autoselection_no_tougaard_parameter_autofit_no_quases_depth_profile_modeling_no_spin_orbit_fitting_no_composition_or_chemical_state_proof
    component_fit:
      source: ea.xps.component_fit:v0.2
      default_enabled: false
      supported_methods:
        - reviewed_component_fit_screening
      supported_peak_shapes:
        - gaussian
        - lorentzian
        - pseudo_voigt
      required_reviewed_inputs:
        - binding_energy_region
        - input_intensity_column
        - component_ids_and_labels
        - peak_shape
        - initial_center_amplitude_fwhm
        - center_amplitude_fwhm_bounds
        - optional_spin_orbit_constraints_signed_delta_area_ratio_fwhm_ratio
        - fit_quality_thresholds
        - references_caveats_confidence
      output_artifacts:
        - xps_component_fit.yml
        - xps_component_fit.csv
        - xps_component_fit_intensity_column
        - xps_component_fit_residual_column
        - xps_component_fit_region_id_column
        - xps_component_fit_spin_orbit_constraint_columns
      spin_orbit_constraints:
        source: ea.xps.component_fit.spin_orbit_constraints:v0.2
        default_enabled: false
        required_reviewed_inputs:
          - constraint_id
          - anchor_component_id
          - dependent_component_id
          - signed_center_delta_eV
          - area_ratio
          - fwhm_ratio
          - parameter_origin_for_source_backed_values
          - source_summary_and_applicability_notes
          - reviewed_bounds_for_both_components
          - references_caveats_confidence
        supported_scope:
          - one_level_anchor_dependent_pairs
        boundary: reviewed_signed_delta_ratio_bounds_with_source_metadata_no_unsourced_constants_no_doublet_identity_inference_no_composition_or_chemical_state_proof
      boundary: reviewed_screening_only_no_automatic_component_background_bounds_peak_shape_selection_no_unreviewed_constrained_spin_orbit_fitting_no_composition_or_chemical_state_proof
    region_records:
      source: ea.xps.region_records:v0.2
      default_enabled: false
      supported_methods:
        - reviewed_multi_region_project_record
      supported_roles:
        - survey
        - core_level
        - valence
        - auger
        - other
      required_reviewed_inputs:
        - region_id_and_label
        - region_role
        - binding_energy_window
        - calibration_group_id_when_shared
        - linked_output_refs_when_available
        - references_caveats_confidence
      output_artifacts:
        - xps_region_records.yml
        - xps_region_records.csv
      boundary: reviewed_project_organization_and_provenance_only_no_survey_core_level_autonomy_no_silent_charge_correction_sharing_no_formal_multi_region_composition_or_chemical_state_proof
    limitations:
      - automatic peaks are screening evidence, not chemical-state assignments
      - first-pass workflow records calibration metadata but does not prove charge correction validity
      - component_quantification_screening uses reviewed windows and optional RSF values only; definitive composition and chemical-state assignment remain future work
      - source_backed_parameter_source_packets stage candidate metadata and optional filtered reference_seeds/guidance_reference_ids from built-in generic_xps_parameters or oxide_o1s_binding_energy seeds, reviewed local libraries/templates, project literature, user-provided sources, or confirmed literature/source-candidate manifests; manifest inputs require explicit confirmation metadata and reference_seeds require explicit ea references register-seeds registration; the packet builder itself does not perform unconfirmed live lookup, download or parse articles, validate references, register references, inject citations, auto-apply values, apply charge correction, fit backgrounds/components, or choose models
      - source_backed_parameter_suggestions validate supplied source packets and registered references before review and can be displayed in reports with --parameter-suggestion; the suggestion/report steps do not perform unconfirmed live lookup, auto-apply values, choose models, silently calibrate spectra, apply charge correction, or prove chemistry/composition, but EA may prepare source-backed candidates before this step, including spin-orbit energy separations, area ratios, FWHM ratios, Tougaard parameters, component bounds, peak-shape candidates, and binding-energy/chemical-state candidates with calibration/charge-reference assumptions when source and applicability metadata are recorded
      - propose-memory writes draft method-note or interpretation memory candidates from confirmed XPS parameter suggestion reviews only; it does not commit confirmed memory, apply parameters, fit backgrounds/components, prove chemical state/composition, apply charge correction, or calculate composition
      - reviewed linear, Shirley, and Tougaard U2 background_subtraction writes preprocessing columns only; automatic Tougaard parameter fitting, QUASES/depth-profile modeling, and formal multi-region quantification remain future work
      - reviewed_component_fit_screening uses explicit reviewed components, peak shapes, initial values, bounds, selected intensity columns, and optional reviewed spin_orbit_constraints with parameter_origin/source metadata when values are source-backed; EA may suggest source-backed candidates, while chemical-state proof, composition proof, silent background/component application without source/review, unsourced constants, and unreviewed constrained fitting remain out of scope
      - reviewed_region_records organize survey/core-level/project-region provenance and linked refs only; automatic spectrum alignment, silent charge-correction sharing, formal multi-region composition, sample ranking, and chemical-state proof remain future work
