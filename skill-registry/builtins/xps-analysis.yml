ea_skill:
  id: ea.xps-analysis
  version: 0.2.0
  category: characterization.surface_spectroscopy
  method: xps
  input_artifacts:
    - raw_spectrum
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - background_model_record
    - background_subtraction_record
    - component_fit_record
    - component_fit_table
    - region_records_record
    - region_records_table
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
    - component_quantification_table
  review_gates:
    - confirm_method
    - confirm_binding_energy_calibration
    - confirm_processing_parameters
    - confirm_peak_model
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
    - literature/references/index.yml
  report_requirements:
    inline_numeric_citations: true
    fitted_component_table_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
    component_labels_required: true
  provenance_requirements:
    raw_is_readonly: true
    calibration_reference_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    implemented: true
    commands:
      - ea xps inspect
      - ea xps process
      - ea xps report
    supported_x_units:
      - eV
      - unknown
    implemented_outputs:
      - processed_csv
      - peak_table
      - background_model_record
      - component_table
      - figure_record
      - markdown_report
      - provenance_record
      - component_quantification_screening
      - background_model_records
      - background_subtraction_linear_preprocessing
      - background_subtraction_shirley_preprocessing
      - background_subtraction_tougaard_u2_preprocessing
      - reviewed_component_fit_screening
      - reviewed_region_records
    background_model_records:
      source: ea.xps.background_model:v0.2
      default_enabled: false
      supported_background_types:
        - shirley
        - tougaard
        - linear
        - local_minimum
        - rolling_quantile
        - instrument_applied
        - other
      output_artifacts:
        - xps_background.yml
      boundary: reviewed_model_provenance_only_no_automatic_shirley_tougaard_subtraction_spin_orbit_fitting_composition_or_chemical_state_proof
    background_subtraction:
      source: ea.xps.background_subtraction:v0.2
      default_enabled: false
      supported_methods:
        - reviewed_linear_background_subtraction
        - reviewed_shirley_background_subtraction
        - reviewed_tougaard_u2_background_subtraction
      output_artifacts:
        - xps_background_subtraction.yml
        - xps_linear_background_column
        - xps_shirley_background_column
        - xps_tougaard_u2_background_column
        - xps_background_subtracted_intensity_column
        - xps_shirley_subtracted_intensity_column
        - xps_tougaard_u2_subtracted_intensity_column
      boundary: reviewed_numeric_preprocessing_only_no_endpoint_autoselection_no_tougaard_parameter_autofit_no_quases_depth_profile_modeling_no_spin_orbit_fitting_no_composition_or_chemical_state_proof
    component_fit:
      source: ea.xps.component_fit:v0.2
      default_enabled: false
      supported_methods:
        - reviewed_component_fit_screening
      supported_peak_shapes:
        - gaussian
        - lorentzian
        - pseudo_voigt
      required_reviewed_inputs:
        - binding_energy_region
        - input_intensity_column
        - component_ids_and_labels
        - peak_shape
        - initial_center_amplitude_fwhm
        - center_amplitude_fwhm_bounds
        - optional_spin_orbit_constraints_signed_delta_area_ratio_fwhm_ratio
        - fit_quality_thresholds
        - references_caveats_confidence
      output_artifacts:
        - xps_component_fit.yml
        - xps_component_fit.csv
        - xps_component_fit_intensity_column
        - xps_component_fit_residual_column
        - xps_component_fit_region_id_column
        - xps_component_fit_spin_orbit_constraint_columns
      spin_orbit_constraints:
        source: ea.xps.component_fit.spin_orbit_constraints:v0.2
        default_enabled: false
        required_reviewed_inputs:
          - constraint_id
          - anchor_component_id
          - dependent_component_id
          - signed_center_delta_eV
          - area_ratio
          - fwhm_ratio
          - reviewed_bounds_for_both_components
          - references_caveats_confidence
        supported_scope:
          - one_level_anchor_dependent_pairs
        boundary: reviewed_signed_delta_ratio_bounds_only_no_constant_lookup_no_doublet_identity_inference_no_composition_or_chemical_state_proof
      boundary: reviewed_screening_only_no_automatic_component_background_bounds_peak_shape_spin_orbit_constant_selection_no_automatic_constrained_spin_orbit_fitting_no_composition_or_chemical_state_proof
    region_records:
      source: ea.xps.region_records:v0.2
      default_enabled: false
      supported_methods:
        - reviewed_multi_region_project_record
      supported_roles:
        - survey
        - core_level
        - valence
        - auger
        - other
      required_reviewed_inputs:
        - region_id_and_label
        - region_role
        - binding_energy_window
        - calibration_group_id_when_shared
        - linked_output_refs_when_available
        - references_caveats_confidence
      output_artifacts:
        - xps_region_records.yml
        - xps_region_records.csv
      boundary: reviewed_project_organization_and_provenance_only_no_survey_core_level_autonomy_no_silent_charge_correction_sharing_no_formal_multi_region_composition_or_chemical_state_proof
    limitations:
      - automatic peaks are screening evidence, not chemical-state assignments
      - first-pass workflow records calibration metadata but does not prove charge correction validity
      - component_quantification_screening uses reviewed windows and optional RSF values only; definitive composition and chemical-state assignment remain future work
      - reviewed linear, Shirley, and Tougaard U2 background_subtraction writes preprocessing columns only; automatic Tougaard parameter fitting, QUASES/depth-profile modeling, and formal multi-region quantification remain future work
      - reviewed_component_fit_screening uses only explicit user-reviewed components, peak shapes, initial values, bounds, selected intensity columns, and optional reviewed spin_orbit_constraints; chemical-state proof, composition proof, automatic background/component selection, spin-orbit constant lookup, and automatic constrained fitting remain future work
      - reviewed_region_records organize survey/core-level/project-region provenance and linked refs only; automatic spectrum alignment, silent charge-correction sharing, formal multi-region composition, sample ranking, and chemical-state proof remain future work
