ea_skill:
  id: ea.uv-vis-analysis
  version: 0.2.0
  category: characterization.spectrum
  method: uv_vis
  input_artifacts:
    - raw_spectrum
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - tauc_screening_table
    - derivative_screening_table
    - correction_context_record
    - numeric_correction_record
    - source_packet
    - interpretation_suggestion_record
    - replicate_comparison_record
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_absorbance_or_transmittance_units
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
  report_requirements:
    inline_numeric_citations: true
    optical_feature_confidence_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
  provenance_requirements:
    raw_is_readonly: true
    processing_parameters_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    implemented: true
    commands:
      - ea uv-vis inspect
      - ea uv-vis process
      - ea uv-vis report
      - ea uv-vis build-source-packet
      - ea uv-vis suggest-interpretations
      - ea uv-vis prepare-review
      - ea uv-vis report --interpretation-suggestion
      - ea uv-vis propose-memory
      - ea uv-vis compare-replicates
    supported_signal_modes:
      - absorbance
      - transmittance
      - reflectance
    tauc_screening:
      implemented: true
      transforms:
        - absorbance
        - kubelka_munk
      requires_reviewed_fit_window_eV: true
      confidence_boundary: screening_only
    derivative_screening:
      implemented: true
      method: numpy_gradient
      supported_axes:
        - auto
        - energy_eV
        - wavelength_nm
        - uv_vis_axis
      confidence_boundary: screening_only
    correction_context_records:
      implemented: true
      record_format: yaml
      fields:
        - sample_geometry
        - substrate
        - reference
        - background
        - diffuse_reflectance
        - correction_notes
      confidence_boundary: metadata_record_only
    numeric_correction:
      implemented: true
      optional: true
      record_format: yaml
      methods:
        - constant_offset
        - subtract_reference_column
      requires_confirmed_parameter_review: true
      output_columns:
        - reference_signal
        - numeric_corrected_signal
      confidence_boundary: reviewed_preprocessing_only
    source_packets:
      implemented: true
      command: ea uv-vis build-source-packet
      sources:
        - editable_template
        - local_yaml_library
        - confirmed_literature_manifest
      candidate_types:
        - optical_transition_model
        - optical_gap_candidate
        - optical_feature_assignment
        - correction_context_candidate
      confidence_boundary: staging_only
    interpretation_suggestions:
      implemented: true
      command: ea uv-vis suggest-interpretations
      candidate_types:
        - optical_transition_model
        - optical_gap_candidate
        - optical_feature_assignment
        - correction_context_candidate
      evidence_links:
        - processed_feature_table
        - tauc_analysis
        - edge_estimate
        - derivative_analysis
        - correction_context_record
      confidence_boundary: advisory_review_target
    review_packages:
      implemented: true
      command: ea uv-vis prepare-review
      grouped_statuses:
        - ready_for_user_review
        - needs_reference_registration
        - no_evidence_match
        - invalid_or_incomplete
      confidence_boundary: user_review_context_only
    reviewed_report_integration:
      implemented: true
      command: ea uv-vis report --interpretation-suggestion ... --interpretation-review-ref ...
      requires_confirmed_review_record: true
      reference_policy: registered_reference_ids_are_numbered; unresolved_ids_remain_visible
      confidence_boundary: reviewed_interpretation_context_only
    memory_candidate_proposals:
      implemented: true
      command: ea uv-vis propose-memory --suggestion ... --review-ref ...
      requires_confirmed_review_record: true
      source_candidates: ready_for_user_review_only_by_default
      excluded_context:
        - needs_reference_registration
        - no_evidence_match
        - invalid_or_incomplete
      confidence_boundary: draft_interpretation_memory_candidate_only
    replicate_comparison:
      implemented: true
      command: ea uv-vis compare-replicates
      input_records:
        - processed_uv_vis_metadata
      outputs:
        - uv_vis_comparison.yml
        - uv_vis_comparison.csv
      statistics:
        - count
        - mean
        - std_population
        - min
        - max
      reviewed_feature_matching:
        implemented: true
        optional: true
        command_flags:
          - --feature-match-tolerance-ev
          - --feature-match-tolerance-nm
          - --feature-match-review-ref
        requires_confirmed_review_record: true
        review_target_type: uv_vis_feature_matching
        output_records:
          - axis_specific_candidate_feature_groups
          - per_group_members_with_feature_ids_sample_result_metadata_refs
          - group_statistics
          - duplicate_record_warnings
        confidence_boundary: reviewed_tolerance_candidate_grouping_only
      confidence_boundary: descriptive_statistics_only
    supported_x_units:
      - nm
      - eV
      - unknown
    limitations:
      - automatic features are screening evidence, not standalone material assignments
      - threshold optical-edge estimates are low-confidence orientation values
      - Tauc/Kubelka-Munk intercepts are screening records, not definitive band-gap assignments
      - derivative extrema and inflection hints are screening records, not definitive transition or mechanism assignments
      - correction-context records preserve reviewed metadata but do not apply automatic numeric correction by themselves
      - numeric_correction applies only reviewed constant-offset or reference-column subtraction before smoothing/normalization/feature detection; it does not choose references, prove correction validity, apply substrate models, or rank samples
      - source packets, interpretation suggestions, and review packages preserve source-backed candidates, reference seeds, registered/unresolved reference IDs, and processed evidence links but do not create ReviewRecords, inject report citations, write memory, or apply optical models/corrections; reviewed report and memory proposal integrations only read confirmed ReviewRecords and registered references, and memory proposal writes draft candidates only
      - replicate comparison records summarize processed metadata with descriptive statistics; reviewed feature matching is optional and requires explicit tolerance parameters plus a confirmed uv_vis_feature_matching ReviewRecord
      - reviewed feature matching records candidate groups only; it does not reprocess raw data, silently match features, infer replicate grouping, prove optical conclusions, or rank samples
      - formal band-gap conclusions require user-confirmed model context, sample geometry, corrections, and references
