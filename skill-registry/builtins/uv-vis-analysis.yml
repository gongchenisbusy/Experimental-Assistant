ea_skill:
  id: ea.uv-vis-analysis
  version: 0.2.0
  category: characterization.spectrum
  method: uv_vis
  input_artifacts:
    - raw_spectrum
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - tauc_screening_table
    - derivative_screening_table
    - correction_context_record
    - source_packet
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_absorbance_or_transmittance_units
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
  report_requirements:
    inline_numeric_citations: true
    optical_feature_confidence_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
  provenance_requirements:
    raw_is_readonly: true
    processing_parameters_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    implemented: true
    commands:
      - ea uv-vis inspect
      - ea uv-vis process
      - ea uv-vis report
      - ea uv-vis build-source-packet
    supported_signal_modes:
      - absorbance
      - transmittance
      - reflectance
    tauc_screening:
      implemented: true
      transforms:
        - absorbance
        - kubelka_munk
      requires_reviewed_fit_window_eV: true
      confidence_boundary: screening_only
    derivative_screening:
      implemented: true
      method: numpy_gradient
      supported_axes:
        - auto
        - energy_eV
        - wavelength_nm
        - uv_vis_axis
      confidence_boundary: screening_only
    correction_context_records:
      implemented: true
      record_format: yaml
      fields:
        - sample_geometry
        - substrate
        - reference
        - background
        - diffuse_reflectance
        - correction_notes
      confidence_boundary: metadata_record_only
    source_packets:
      implemented: true
      command: ea uv-vis build-source-packet
      sources:
        - editable_template
        - local_yaml_library
        - confirmed_literature_manifest
      candidate_types:
        - optical_transition_model
        - optical_gap_candidate
        - optical_feature_assignment
        - correction_context_candidate
      confidence_boundary: staging_only
    supported_x_units:
      - nm
      - eV
      - unknown
    limitations:
      - automatic features are screening evidence, not standalone material assignments
      - threshold optical-edge estimates are low-confidence orientation values
      - Tauc/Kubelka-Munk intercepts are screening records, not definitive band-gap assignments
      - derivative extrema and inflection hints are screening records, not definitive transition or mechanism assignments
      - correction-context records preserve reviewed metadata but do not apply automatic numeric correction
      - source packets preserve source-backed candidates and reference seeds but do not generate UV-Vis suggestions, inject report citations, or apply optical models
      - formal band-gap conclusions require user-confirmed model context, sample geometry, corrections, and references
