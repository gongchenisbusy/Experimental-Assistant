ea_skill:
  id: ea.raman-analysis
  version: 0.2.0
  category: characterization.spectrum
  method: raman
  input_artifacts:
    - raw_spectrum
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - assignment_library_discovery_summary
    - processed_result
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  commands:
    - ea raman inspect
    - ea raman list-assignment-libraries
    - ea raman process
    - ea raman report
  review_gates:
    - confirm_method
    - confirm_columns_and_units
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
  report_requirements:
    inline_numeric_citations: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
  provenance_requirements:
    raw_is_readonly: true
    processing_parameters_required: true
    generated_outputs_outside_raw: true
