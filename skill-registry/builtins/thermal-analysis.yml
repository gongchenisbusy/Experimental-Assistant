ea_skill:
  id: ea.thermal-analysis
  version: 0.2.0
  category: characterization.thermal
  method: thermal_analysis
  input_artifacts:
    - raw_thermal_data
    - sample_context
    - project_context
    - user_review_state
  output_artifacts:
    - processed_result
    - baseline_correction
    - transition_table
    - transition_record
    - context_record
    - figure_record
    - report_section
    - provenance_record
    - memory_candidate
  review_gates:
    - confirm_method
    - confirm_temperature_program
    - confirm_processing_parameters
    - confirm_interpretation_before_memory_write
  required_indices:
    - raw/index.yml
    - reports/index.yml
    - figures/index.yml
    - provenance/index.yml
  report_requirements:
    inline_numeric_citations: true
    event_assignment_confidence_required: true
    confidence_labels:
      - high
      - medium
      - low
      - insufficient
  figure_requirements:
    footer: "FigID: {figure_id} | Report: {report_id}"
    style_profile: nature_like_clean
  provenance_requirements:
    raw_is_readonly: true
    temperature_program_required: true
    generated_outputs_outside_raw: true
  current_v0_2_support:
    commands:
      - ea thermal inspect
      - ea thermal process
      - ea thermal report
      - ea templates parameters thermal_analysis
      - ea batch validate/run with method: thermal_analysis
    supported_modes:
      - tga
      - dsc
      - dtg
      - unknown
    supported_units:
      temperature_unit:
        - C
        - K
        - unknown
      signal_unit:
        - "%"
        - mg
        - mW
        - W/g
        - mW/mg
        - unknown
    context_records:
      source: ea.thermal.context_record:v0.2
      default_enabled: false
      fields:
        - dsc_sign_convention
        - baseline_reference
        - sample_context
        - atmosphere_program
        - correction_notes
      boundary: metadata_provenance_only_no_sign_inversion_baseline_correction_transition_assignment_kinetics_or_mechanism_claim
    baseline_corrections:
      source: ea.thermal.baseline_correction:v0.2
      default_enabled: false
      supported_methods:
        - linear_two_point
      supported_modes:
        - dsc
        - dtg
      output_columns:
        - baseline_estimate
        - baseline_corrected_signal
      boundary: numeric_processing_only_no_transition_assignment_kinetics_stability_ranking_or_mechanism_claim
    transition_screening:
      source: ea.thermal.transition_analysis:v0.2
      default_enabled: false
      method: reviewed_window_screening
      supported_modes:
        - dsc
      supported_candidates:
        - Tg
        - Tm
        - Tc
      output_artifacts:
        - thermal_transitions.csv
        - thermal_transitions.yml
      boundary: reviewed_window_candidate_metrics_only_no_formal_transition_assignment_kinetics_stability_ranking_or_mechanism_claim
    limitations:
      - no_formal_glass_transition_or_melting_assignment_without_user_review_and_future_protocol_model
      - no_kinetic_model_fitting
      - no_reference_correction_or_nonlinear_baseline_model
      - no_formal_thermal_stability_ranking_without_replicates_and_user_review
      - no_memory_write_without_user_confirmation
